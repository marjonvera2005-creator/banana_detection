<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detection - Banana Inspection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="min-h-screen">
    <nav class="glass shadow-2xl sticky top-0 z-50">
        <div class="container mx-auto px-4 sm:px-6 py-4">
            <div class="flex items-center justify-between flex-wrap">
                <div class="flex items-center space-x-2 sm:space-x-3">
                    <img src="{{ url_for('static', filename='images/banana.png') }}" alt="Logo" class="w-10 h-10 sm:w-12 sm:h-12 object-contain">
                    <span class="text-lg sm:text-2xl font-bold bg-gradient-to-r from-green-600 to-yellow-600 bg-clip-text text-transparent">Banana Inspection System</span>
                </div>
                <div class="flex space-x-3 sm:space-x-6 text-sm sm:text-base mt-2 sm:mt-0">
                    <a href="/" class="text-gray-700 hover:text-green-600 font-medium">Home</a>
                    <a href="/detect" class="text-green-600 font-bold">Detection</a>
                    <a href="/history" class="text-gray-700 hover:text-green-600 font-medium">History</a>
                    <a href="/dashboard" class="text-gray-700 hover:text-green-600 font-medium">Dashboard</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 sm:px-6 py-6 sm:py-8">
        <h1 class="text-2xl sm:text-3xl md:text-4xl font-bold text-center mb-6 sm:mb-8 text-white drop-shadow-lg">Banana Quality Inspection</h1>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 sm:gap-8">
            <div class="glass rounded-2xl shadow-2xl p-4 sm:p-6 md:p-8">
                <h2 class="text-xl sm:text-2xl font-bold mb-4 sm:mb-6 flex items-center">
                    <i class="fas fa-upload text-green-600 mr-2 sm:mr-3"></i>
                    Upload Image
                </h2>
                
                <div id="dropZone" class="border-4 border-dashed border-gray-300 rounded-lg p-8 sm:p-12 text-center cursor-pointer hover:border-green-500 transition">
                    <i class="fas fa-cloud-upload-alt text-4xl sm:text-6xl text-gray-400 mb-3 sm:mb-4"></i>
                    <p class="text-base sm:text-xl text-gray-600 mb-2">Drag & Drop or Click to Upload</p>
                    <p class="text-xs sm:text-sm text-gray-500">Supported: JPG, PNG, JPEG</p>
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                </div>

                <div id="preview" class="mt-4 sm:mt-6 hidden">
                    <img id="previewImage" class="w-full rounded-lg shadow-lg max-h-64 sm:max-h-96 object-contain">
                    <button id="analyzeBtn" class="w-full mt-3 sm:mt-4 bg-green-600 text-white py-2 sm:py-3 rounded-lg text-sm sm:text-base font-semibold hover:bg-green-700 transition">
                        <i class="fas fa-search mr-2"></i>
                        Analyze Image
                    </button>
                </div>

                <div id="loading" class="hidden mt-4 sm:mt-6 text-center">
                    <i class="fas fa-spinner fa-spin text-3xl sm:text-4xl text-green-600"></i>
                    <p class="mt-2 text-sm sm:text-base text-gray-600">Analyzing...</p>
                </div>
            </div>

            <div class="glass rounded-2xl shadow-2xl p-4 sm:p-6 md:p-8">
                <h2 class="text-xl sm:text-2xl font-bold mb-4 sm:mb-6 flex items-center">
                    <i class="fas fa-clipboard-check text-green-600 mr-2 sm:mr-3"></i>
                    Inspection Results
                </h2>

                <div id="noResult" class="text-center py-8 sm:py-12 text-gray-400">
                    <i class="fas fa-image text-4xl sm:text-6xl mb-3 sm:mb-4"></i>
                    <p class="text-base sm:text-xl">Upload an image to see results</p>
                </div>

                <div id="resultContainer" class="hidden">
                    <div class="mb-4 sm:mb-6">
                        <img id="resultImage" class="w-full rounded-lg shadow-lg max-h-64 sm:max-h-96 object-contain">
                    </div>

                    <div class="space-y-3 sm:space-y-4">
                        <div class="flex items-center justify-between p-3 sm:p-4 bg-gray-50 rounded-lg">
                            <span class="text-sm sm:text-base font-semibold">Classification:</span>
                            <span id="resultClass" class="text-base sm:text-xl font-bold"></span>
                        </div>

                        <div class="flex items-center justify-between p-3 sm:p-4 bg-gray-50 rounded-lg">
                            <span class="text-sm sm:text-base font-semibold">Confidence:</span>
                            <span id="resultConfidence" class="text-base sm:text-xl font-bold"></span>
                        </div>

                        <div id="statusBadge" class="p-3 sm:p-4 rounded-lg text-center text-white font-bold text-lg sm:text-xl">
                            <span id="resultStatus"></span>
                        </div>

                        <div class="p-3 sm:p-4 bg-blue-50 border-l-4 border-blue-500 rounded">
                            <p class="text-sm sm:text-base font-semibold text-blue-900 mb-1 sm:mb-2">Recommendation:</p>
                            <p id="resultMessage" class="text-sm sm:text-base text-blue-800"></p>
                        </div>

                        <div class="p-3 sm:p-4 bg-green-50 border-l-4 border-green-500 rounded">
                            <p class="text-sm sm:text-base font-semibold text-green-900 mb-1 sm:mb-2">Action Required:</p>
                            <p id="resultAction" class="text-sm sm:text-base text-green-800"></p>
                        </div>
                    </div>

                    <button id="newInspection" class="w-full mt-4 sm:mt-6 bg-gray-600 text-white py-2 sm:py-3 rounded-lg text-sm sm:text-base font-semibold hover:bg-gray-700 transition">
                        <i class="fas fa-redo mr-2"></i>
                        New Inspection
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const previewImage = document.getElementById('previewImage');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const noResult = document.getElementById('noResult');
        const resultContainer = document.getElementById('resultContainer');
        let selectedFile = null;

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-green-500');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('border-green-500');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-green-500');
            const file = e.dataTransfer.files[0];
            handleFile(file);
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            handleFile(file);
        });

        function handleFile(file) {
            if (file && file.type.startsWith('image/')) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImage.src = e.target.result;
                    preview.classList.remove('hidden');
                    dropZone.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            loading.classList.remove('hidden');
            preview.classList.add('hidden');
            noResult.classList.add('hidden');

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                loading.classList.add('hidden');

                if (data.success) {
                    displayResults(data);
                } else {
                    alert('Error: ' + data.error);
                    preview.classList.remove('hidden');
                }
            } catch (error) {
                loading.classList.add('hidden');
                alert('Error: ' + error.message);
                preview.classList.remove('hidden');
            }
        });

        function displayResults(data) {
            document.getElementById('resultImage').src = previewImage.src;
            document.getElementById('resultClass').textContent = data.class.toUpperCase();
            document.getElementById('resultConfidence').textContent = data.confidence + '%';
            document.getElementById('resultStatus').textContent = data.status;
            document.getElementById('resultMessage').textContent = data.message;
            document.getElementById('resultAction').textContent = data.action;

            const statusBadge = document.getElementById('statusBadge');
            statusBadge.className = 'p-4 rounded-lg text-center text-white font-bold text-xl bg-' + data.color + '-600';

            resultContainer.classList.remove('hidden');
        }

        document.getElementById('newInspection').addEventListener('click', () => {
            resultContainer.classList.add('hidden');
            dropZone.classList.remove('hidden');
            preview.classList.add('hidden');
            noResult.classList.remove('hidden');
            fileInput.value = '';
            selectedFile = null;
        });
    </script>
</body>
</html>
